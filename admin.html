<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ממשק ניהול — בגרות מונופול</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #f0c040; --gold2: #d4a017; --text: #f0ead6;
  --bg: #0a0e1a; --card: #141828;
  --border: rgba(255,255,255,0.08); --accent: #7c83ff;
}
*{box-sizing:border-box;margin:0;padding:0}
body { font-family: 'Rubik', sans-serif; background: #0a0e1a; color: var(--text); min-height: 100vh; direction: rtl; }

/* ── HEADER ── */
.admin-header {
  background: linear-gradient(135deg, #1a1200, #110d00);
  border-bottom: 2px solid var(--gold2);
  padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.admin-title { font-size: 20px; font-weight: 800; color: var(--gold); }
.admin-sub { font-size: 11px; color: rgba(240,192,64,0.5); }
.btn-back {
  padding: 8px 16px; border-radius: 10px; border: 1.5px solid rgba(240,192,64,0.3);
  background: rgba(240,192,64,0.08); color: var(--gold);
  font-family: 'Rubik', sans-serif; font-size: 12px; cursor: pointer;
  transition: all 0.2s;
}
.btn-back:hover { background: rgba(240,192,64,0.15); }

/* ── LAYOUT ── */
.admin-layout { display: flex; height: calc(100vh - 60px); }

/* ── SIDEBAR ── */
.sidebar {
  width: 280px; min-width: 280px;
  background: #0d1020; border-left: 1px solid var(--border);
  overflow-y: auto; display: flex; flex-direction: column;
}
.sidebar-title {
  padding: 14px 16px 8px;
  font-size: 10px; font-weight: 700; color: rgba(240,192,64,0.5);
  letter-spacing: 1.5px; text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
.concept-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.concept-item {
  padding: 9px 16px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: all 0.15s; border-right: 3px solid transparent;
  font-size: 13px;
}
.concept-item:hover { background: rgba(255,255,255,0.04); }
.concept-item.active {
  background: rgba(124,131,255,0.1);
  border-right-color: var(--accent);
  color: var(--accent);
}
.concept-zone-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.concept-id { font-size: 10px; color: #555; min-width: 20px; }
.concept-name { flex: 1; }

/* Sidebar footer */
.sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }
.btn-add {
  width: 100%; padding: 10px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, var(--gold2), var(--gold));
  color: #1a1200; font-family: 'Rubik', sans-serif;
  font-size: 13px; font-weight: 800; cursor: pointer;
  transition: all 0.2s;
}
.btn-add:hover { transform: translateY(-1px); }

/* ── MAIN EDITOR ── */
.editor { flex: 1; overflow-y: auto; padding: 24px; }
.editor-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 12px; color: #555;
}
.editor-empty-icon { font-size: 48px; }
.editor-empty-text { font-size: 14px; }

/* Editor form */
.editor-title {
  font-size: 22px; font-weight: 800; color: var(--gold);
  margin-bottom: 4px;
}
.editor-sub { font-size: 12px; color: #666; margin-bottom: 20px; }

.form-section { margin-bottom: 22px; }
.form-label { font-size: 11px; font-weight: 700; color: rgba(240,192,64,0.6); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.form-input {
  width: 100%; padding: 10px 14px; border-radius: 10px;
  border: 1.5px solid #2a2f4a; background: #141828;
  color: var(--text); font-family: 'Rubik', sans-serif;
  font-size: 14px; outline: none; direction: rtl;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--accent); }
.form-textarea {
  width: 100%; padding: 10px 14px; border-radius: 10px;
  border: 1.5px solid #2a2f4a; background: #141828;
  color: var(--text); font-family: 'Rubik', sans-serif;
  font-size: 13px; outline: none; direction: rtl; resize: vertical;
  min-height: 90px; transition: border-color 0.2s; line-height: 1.6;
}
.form-textarea:focus { border-color: var(--accent); }

.form-select {
  width: 100%; padding: 10px 14px; border-radius: 10px;
  border: 1.5px solid #2a2f4a; background: #141828;
  color: var(--text); font-family: 'Rubik', sans-serif;
  font-size: 14px; outline: none; cursor: pointer;
  transition: border-color 0.2s;
}
.form-select:focus { border-color: var(--accent); }

/* Question cards */
.questions-grid { display: flex; flex-direction: column; gap: 14px; }
.question-card {
  background: #141828; border: 1px solid var(--border);
  border-radius: 14px; padding: 16px;
}
.q-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.q-card-num { font-size: 11px; font-weight: 700; color: var(--accent); }
.btn-remove-q {
  padding: 4px 10px; border-radius: 6px;
  border: 1px solid rgba(239,68,68,0.3); background: rgba(239,68,68,0.08);
  color: #ef4444; font-size: 11px; cursor: pointer; transition: all 0.2s;
}
.btn-remove-q:hover { background: rgba(239,68,68,0.2); }

.opts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
.opt-row { display: flex; align-items: center; gap: 6px; }
.opt-radio { cursor: pointer; accent-color: var(--accent); width: 14px; height: 14px; }
.opt-input {
  flex: 1; padding: 7px 10px; border-radius: 8px;
  border: 1.5px solid #2a2f4a; background: #0d1020;
  color: var(--text); font-family: 'Rubik', sans-serif;
  font-size: 12px; outline: none;
  transition: border-color 0.2s;
}
.opt-input:focus { border-color: var(--accent); }
.opt-row input[type=radio]:checked + .opt-input { border-color: #22c55e; }

/* Action bar */
.action-bar {
  display: flex; gap: 10px; flex-wrap: wrap;
  margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border);
}
.btn-save {
  padding: 12px 24px; border-radius: 12px; border: none;
  background: linear-gradient(135deg, var(--gold2), var(--gold));
  color: #1a1200; font-family: 'Rubik', sans-serif;
  font-size: 14px; font-weight: 800; cursor: pointer;
  transition: all 0.2s;
}
.btn-save:hover { transform: translateY(-1px); }
.btn-addq {
  padding: 12px 20px; border-radius: 12px;
  border: 1.5px solid var(--accent); background: rgba(124,131,255,0.1);
  color: var(--accent); font-family: 'Rubik', sans-serif;
  font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;
}
.btn-addq:hover { background: rgba(124,131,255,0.2); }
.btn-delete {
  padding: 12px 20px; border-radius: 12px;
  border: 1.5px solid rgba(239,68,68,0.3); background: rgba(239,68,68,0.06);
  color: #ef4444; font-family: 'Rubik', sans-serif;
  font-size: 13px; cursor: pointer; transition: all 0.2s;
}
.btn-delete:hover { background: rgba(239,68,68,0.15); }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #1a1d2e; border: 1px solid #22c55e;
  padding: 10px 24px; border-radius: 30px;
  font-size: 13px; color: #86efac; z-index: 999;
  animation: toastIn 0.3s ease; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.toast.error { border-color: #ef4444; color: #fca5a5; }
@keyframes toastIn { from{transform:translateX(-50%) translateY(20px);opacity:0} to{transform:translateX(-50%) translateY(0);opacity:1} }

/* Leaderboard tab */
.lb-full { padding: 0 24px 24px; }
.lb-title { font-size: 14px; font-weight: 700; color: var(--gold); margin-bottom: 14px; }
.lb-table { width: 100%; border-collapse: collapse; }
.lb-table th { font-size: 11px; color: #666; font-weight: 600; padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: right; }
.lb-table td { font-size: 13px; padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.lb-table tr:hover td { background: rgba(255,255,255,0.02); }
.medal { font-size: 16px; }

/* Tab bar */
.tab-bar {
  display: flex; gap: 0; border-bottom: 2px solid var(--border);
  padding: 0 24px; background: #0d1020;
}
.tab {
  padding: 12px 18px; font-size: 13px; font-weight: 600;
  color: #666; cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: all 0.2s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }

.tab-content { display: none; }
.tab-content.active { display: block; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2e3250; border-radius: 2px; }
</style>
</head>
<body>

<div class="admin-header">
  <div>
    <div class="admin-title">⚙️ ממשק ניהול</div>
    <div class="admin-sub">עריכת שאלות ומושגים · בגרות מונופול תשפ"ו</div>
  </div>
  <button class="btn-back" id="btnBack">← חזור לבית</button>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <div class="tab active" id="tabBtnConcepts">📚 מושגים ושאלות</div>
  <div class="tab" id="tabBtnLeaderboard">🏆 לוח שיאים</div>
</div>

<div id="tabConcepts" class="tab-content active">
  <div class="admin-layout" style="height:calc(100vh - 110px)">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-title">מושגים (33)</div>
      <div class="concept-list" id="conceptList"></div>
      <div class="sidebar-footer">
        <button class="btn-add" id="btnAddConcept">+ הוסף מושג חדש</button>
      </div>
    </div>

    <!-- EDITOR -->
    <div class="editor" id="editorPanel">
      <div class="editor-empty">
        <div class="editor-empty-icon">📝</div>
        <div class="editor-empty-text">בחר מושג מהרשימה לעריכה</div>
      </div>
    </div>
  </div>
</div>

<div id="tabLeaderboard" class="tab-content">
  <div class="lb-full">
    <div style="height:16px"></div>
    <div class="lb-title">🏆 לוח שיאים — מצטיינים</div>
    <table class="lb-table">
      <thead>
        <tr>
          <th>#</th>
          <th>שם</th>
          <th>ניקוד</th>
          <th>עודכן</th>
        </tr>
      </thead>
      <tbody id="lbTableBody">
        <tr><td colspan="4" style="text-align:center;color:#555;padding:30px">טוען...</td></tr>
      </tbody>
    </table>
    <div style="margin-top:16px">
      <button id="btnClearLb" style="padding:8px 16px;border-radius:8px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.08);color:#ef4444;font-family:Rubik;font-size:12px;cursor:pointer">
        🗑 נקה לוח שיאים
      </button>
    </div>
  </div>
</div>

<script type="module">
import { DEFAULT_CONCEPTS, ZONE_COLORS, ZONE_NAMES } from './js/concepts-data.js';
import { loadCustomConcepts, saveCustomConcepts, getLeaderboard, db, ref, set, remove } from './js/firebase-config.js';

let concepts = [];
let selectedId = null;

// ── Tab switching ──
function switchTab(tab) {
  document.getElementById('tabBtnConcepts').classList.toggle('active', tab === 'concepts');
  document.getElementById('tabBtnLeaderboard').classList.toggle('active', tab === 'leaderboard');
  document.getElementById('tabConcepts').classList.toggle('active', tab === 'concepts');
  document.getElementById('tabLeaderboard').classList.toggle('active', tab === 'leaderboard');
  if (tab === 'leaderboard') loadLbTable();
}

// ── Load concepts ──
async function loadConcepts() {
  try {
    const custom = await loadCustomConcepts();
    if (custom && Object.keys(custom).length > 0) {
      concepts = Object.values(custom).sort((a,b) => a.id - b.id);
    } else {
      concepts = JSON.parse(JSON.stringify(DEFAULT_CONCEPTS));
    }
  } catch(e) {
    concepts = JSON.parse(JSON.stringify(DEFAULT_CONCEPTS));
  }
  renderSidebar();
}

// ── Sidebar ──
function renderSidebar() {
  const list = document.getElementById('conceptList');
  list.innerHTML = concepts.map(c => `
    <div class="concept-item ${c.id === selectedId ? 'active' : ''}" data-action="selectConcept" data-id="${c.id}">
      <div class="concept-zone-dot" style="background:${ZONE_COLORS[c.zone]}"></div>
      <span class="concept-id">${c.id}</span>
      <span class="concept-name">${c.name}</span>
    </div>`).join('');
}

// ── Select concept ──
function selectConcept(id) {
  selectedId = id;
  renderSidebar();
  const c = concepts.find(x => x.id === id);
  if (!c) return;
  renderEditor(c);
}

// ── Editor ──
function renderEditor(c) {
  const panel = document.getElementById('editorPanel');
  const zoneOpts = Object.entries(ZONE_NAMES).map(([k,v]) =>
    `<option value="${k}" ${c.zone == k ? 'selected' : ''}>${k} — ${v}</option>`).join('');

  panel.innerHTML = `
    <div class="editor-title">עריכת מושג #${c.id}</div>
    <div class="editor-sub">שינויים יישמרו ב-Firebase וישפיעו על כל המשחקים</div>

    <div class="form-section">
      <div class="form-label">שם המושג</div>
      <input class="form-input" id="fName" value="${esc(c.name)}" placeholder="שם המושג"/>
    </div>

    <div class="form-section">
      <div class="form-label">תיאור קצר</div>
      <input class="form-input" id="fShort" value="${esc(c.short)}" placeholder="תיאור קצר"/>
    </div>

    <div class="form-section">
      <div class="form-label">זירה (צבע)</div>
      <select class="form-select" id="fZone">${zoneOpts}</select>
    </div>

    <div class="form-section">
      <div class="form-label">הגדרה (HTML מותר)</div>
      <textarea class="form-textarea" id="fDef" rows="4">${esc(c.def)}</textarea>
    </div>

    <div class="form-section">
      <div class="form-label">שאלות חידון (${c.quiz.length})</div>
      <div class="questions-grid" id="questionsGrid">
        ${c.quiz.map((q,qi) => renderQuestionCard(q, qi)).join('')}
      </div>
    </div>

    <div class="action-bar">
      <button class="btn-save" data-action="saveConcept">💾 שמור שינויים</button>
      <button class="btn-addq" data-action="addQuestion">+ הוסף שאלה</button>
      <button class="btn-delete" data-action="deleteConcept" data-id="${c.id}">🗑 מחק מושג</button>
    </div>`;
}

function renderQuestionCard(q, qi) {
  const levels = ['הבנה','יישום','ניתוח','הערכה'].map(l =>
    `<option ${q.level === l ? 'selected' : ''}>${l}</option>`).join('');

  const optsHtml = (q.opts || ['','','','']).map((o, oi) => `
    <div class="opt-row">
      <input type="radio" class="opt-radio" name="ans_${qi}" value="${oi}" ${q.ans === oi ? 'checked' : ''} id="radio_${qi}_${oi}">
      <input class="opt-input" id="opt_${qi}_${oi}" value="${esc(o)}" placeholder="אפשרות ${oi+1}"/>
    </div>`).join('');

  return `
    <div class="question-card" id="qcard_${qi}">
      <div class="q-card-header">
        <div class="q-card-num">שאלה ${qi+1}</div>
        <button class="btn-remove-q" data-action="removeQuestion" data-qi="${qi}">הסר</button>
      </div>
      <div class="form-section" style="margin-bottom:10px">
        <div class="form-label" style="margin-bottom:4px">רמה</div>
        <select class="form-select" id="qlevel_${qi}" style="width:auto;padding:6px 10px;font-size:12px">${levels}</select>
      </div>
      <div class="form-section" style="margin-bottom:10px">
        <div class="form-label" style="margin-bottom:4px">שאלה</div>
        <textarea class="form-textarea" id="qtext_${qi}" rows="2" style="min-height:60px">${esc(q.q)}</textarea>
      </div>
      <div class="form-label" style="margin-bottom:6px">תשובות (סמן את הנכונה)</div>
      <div class="opts-grid">${optsHtml}</div>
      <div class="form-section" style="margin-top:10px;margin-bottom:0">
        <div class="form-label" style="margin-bottom:4px">הסבר</div>
        <input class="form-input" id="qexplain_${qi}" value="${esc(q.explain||'')}" placeholder="הסבר לתשובה הנכונה" style="font-size:12px"/>
      </div>
    </div>`;
}

function esc(s) { return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Collect quiz from DOM ──
function collectQuiz() {
  const grid = document.getElementById('questionsGrid');
  if (!grid) return [];
  const cards = grid.querySelectorAll('.question-card');
  const quiz = [];
  cards.forEach((card, qi) => {
    const idx = parseInt(card.id.replace('qcard_',''));
    const opts = [0,1,2,3].map(oi => {
      const el = document.getElementById(`opt_${idx}_${oi}`);
      return el ? el.value : '';
    });
    const ansEl = card.querySelector(`input[name="ans_${idx}"]:checked`);
    const ans = ansEl ? parseInt(ansEl.value) : 0;
    quiz.push({
      level: document.getElementById(`qlevel_${idx}`)?.value || 'הבנה',
      q: document.getElementById(`qtext_${idx}`)?.value || '',
      opts,
      ans,
      explain: document.getElementById(`qexplain_${idx}`)?.value || ''
    });
  });
  return quiz;
}

// ── Add question ──
function addQuestion() {
  const c = concepts.find(x => x.id === selectedId);
  if (!c) return;
  const newQ = { level:'הבנה', q:'', opts:['','','',''], ans:0, explain:'' };
  c.quiz = collectQuiz();
  c.quiz.push(newQ);
  renderEditor(c);
  // Scroll to bottom
  document.getElementById('editorPanel').scrollTop = 9999;
};

// ── Remove question ──
function removeQuestion(qi) {
  const c = concepts.find(x => x.id === selectedId);
  if (!c) return;
  c.quiz = collectQuiz();
  c.quiz.splice(qi, 1);
  renderEditor(c);
};

// ── Save concept ──
async function saveConcept() {
  const c = concepts.find(x => x.id === selectedId);
  if (!c) return;
  c.name = document.getElementById('fName')?.value || c.name;
  c.short = document.getElementById('fShort')?.value || c.short;
  c.zone = parseInt(document.getElementById('fZone')?.value ?? c.zone);
  c.def = document.getElementById('fDef')?.value || c.def;
  c.quiz = collectQuiz();

  try {
    const map = {};
    concepts.forEach(x => map[x.id] = x);
    await saveCustomConcepts(map);
    renderSidebar();
    showToast('✓ המושג נשמר בהצלחה');
  } catch(e) {
    showToast('שגיאה בשמירה: ' + e.message, true);
  }
};

// ── Delete concept ──
async function deleteConcept(id) {
  if (!confirm('האם למחוק מושג זה? הפעולה בלתי הפיכה.')) return;
  concepts = concepts.filter(c => c.id !== id);
  selectedId = null;
  try {
    const map = {};
    concepts.forEach(x => map[x.id] = x);
    await saveCustomConcepts(map);
    document.getElementById('editorPanel').innerHTML = `<div class="editor-empty"><div class="editor-empty-icon">📝</div><div class="editor-empty-text">בחר מושג מהרשימה לעריכה</div></div>`;
    renderSidebar();
    showToast('✓ המושג נמחק');
  } catch(e) {
    showToast('שגיאה: ' + e.message, true);
  }
};

// ── Add new concept ──
function addNewConcept() {
  const maxId = Math.max(...concepts.map(c => c.id), 0);
  const newC = {
    id: maxId + 1, name: 'מושג חדש', zone: 0, short: 'תיאור קצר',
    def: '<p>הגדרה של המושג</p>',
    quiz: [{ level:'הבנה', q:'', opts:['','','',''], ans:0, explain:'' }]
  };
  concepts.push(newC);
  selectedId = newC.id;
  renderSidebar();
  renderEditor(newC);
};

// ── Leaderboard ──
async function loadLbTable() {
  try {
    const lb = await getLeaderboard();
    const tbody = document.getElementById('lbTableBody');
    if (!lb.length) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#555;padding:30px">אין נתונים עדיין</td></tr>';
      return;
    }
    const medals = ['🥇','🥈','🥉'];
    tbody.innerHTML = lb.map((p, i) => `
      <tr>
        <td><span class="medal">${medals[i] || (i+1)}</span></td>
        <td style="font-weight:600">${p.name}</td>
        <td style="color:var(--gold);font-weight:700">⭐ ${p.score}</td>
        <td style="color:#555;font-size:11px">${new Date(p.updatedAt||0).toLocaleDateString('he-IL')}</td>
      </tr>`).join('');
  } catch(e) {}
}

async function clearLeaderboard() {
  if (!confirm('למחוק את כל לוח השיאים? הפעולה בלתי הפיכה.')) return;
  try {
    await set(ref(db, 'leaderboard'), null);
    showToast('✓ לוח השיאים נוקה');
    loadLbTable();
  } catch(e) {
    showToast('שגיאה: ' + e.message, true);
  }
};

// ── Toast ──
function showToast(msg, isError = false) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast' + (isError ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ── Event wiring ──
document.getElementById('btnBack').addEventListener('click', () => window.location.href = 'index.html');
document.getElementById('tabBtnConcepts').addEventListener('click', () => switchTab('concepts'));
document.getElementById('tabBtnLeaderboard').addEventListener('click', () => switchTab('leaderboard'));
document.getElementById('btnAddConcept').addEventListener('click', () => addNewConcept());
document.getElementById('btnClearLb').addEventListener('click', () => clearLeaderboard());

// Event delegation for sidebar concept list
document.getElementById('conceptList').addEventListener('click', function(e) {
  const item = e.target.closest('[data-action="selectConcept"]');
  if (item) selectConcept(parseInt(item.dataset.id));
});

// Event delegation for editor panel (dynamic buttons)
document.getElementById('editorPanel').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  if (action === 'saveConcept') saveConcept();
  else if (action === 'addQuestion') addQuestion();
  else if (action === 'deleteConcept') deleteConcept(parseInt(btn.dataset.id));
  else if (action === 'removeQuestion') removeQuestion(parseInt(btn.dataset.qi));
});

// ── Init ──
loadConcepts();
</script>
