<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בגרות מונופול — תקשורת וחברה תשפ"ו</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #f0c040; --gold2: #d4a017; --text: #f0ead6;
  --bg: #0a0e1a; --card: rgba(255,255,255,0.05);
}
*{box-sizing:border-box;margin:0;padding:0}
.hidden { display: none !important; }
body {
  font-family: 'Rubik', sans-serif;
  background: radial-gradient(ellipse at 50% 0%, #1a2a50 0%, #0a0e1a 70%);
  min-height: 100vh; color: var(--text); overflow-x: hidden;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 20px;
}

/* ── Stars background ── */
.stars {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  overflow: hidden;
}
.star {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,0.7);
  animation: twinkle var(--t, 3s) ease-in-out infinite;
}
@keyframes twinkle {
  0%,100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.4); }
}

/* ── Logo ── */
.logo-wrap {
  position: relative; z-index: 1; text-align: center;
  margin-bottom: 32px; animation: slideDown 0.8s ease;
}
@keyframes slideDown { from{opacity:0;transform:translateY(-30px)} to{opacity:1;transform:translateY(0)} }
.logo-icon { font-size: 72px; display: block; margin-bottom: 8px;
  animation: bounce 2s ease-in-out infinite; }
@keyframes bounce {
  0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)}
}
.logo-title {
  font-size: clamp(28px, 5vw, 42px); font-weight: 900; color: var(--gold);
  letter-spacing: 2px; text-shadow: 0 0 40px rgba(240,192,64,0.4);
}
.logo-sub { font-size: 14px; color: rgba(240,192,64,0.6); margin-top: 4px; }

/* ── Main card ── */
.main-card {
  position: relative; z-index: 1;
  background: linear-gradient(160deg, #1a1d2e, #0e1020);
  border: 1px solid rgba(240,192,64,0.2);
  border-radius: 24px; padding: 32px 28px;
  width: 100%; max-width: 440px;
  box-shadow: 0 0 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
  animation: slideUp 0.8s 0.2s both ease;
}
@keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

.section-title {
  font-size: 12px; font-weight: 700; color: rgba(240,192,64,0.6);
  letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 14px;
}

/* ── Mode selector ── */
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.mode-btn {
  padding: 14px 10px; border-radius: 14px;
  border: 2px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  cursor: pointer; text-align: center; transition: all 0.2s;
  color: var(--text);
}
.mode-btn:hover { border-color: var(--gold2); background: rgba(240,192,64,0.05); }
.mode-btn.selected {
  border-color: var(--gold); background: rgba(240,192,64,0.1);
  box-shadow: 0 0 20px rgba(240,192,64,0.15);
}
.mode-icon { font-size: 28px; display: block; margin-bottom: 6px; }
.mode-label { font-size: 13px; font-weight: 600; }
.mode-desc { font-size: 10px; color: #888; margin-top: 2px; }

/* ── Name input ── */
.name-section { margin-bottom: 24px; }
.name-input {
  width: 100%; padding: 12px 16px; border-radius: 12px;
  border: 1.5px solid #2e3250; background: #252840;
  color: var(--text); font-family: 'Rubik', sans-serif;
  font-size: 15px; outline: none; direction: rtl;
  transition: border-color 0.2s;
}
.name-input:focus { border-color: #7c83ff; }
.name-input::placeholder { color: #555; }

/* ── Player count (group mode) ── */
.np-section { margin-bottom: 24px; }
.np-grid { display: flex; gap: 8px; }
.np-btn {
  flex: 1; padding: 10px; border-radius: 10px;
  border: 1.5px solid #2e3250; background: #252840;
  color: var(--text); font-family: 'Rubik', sans-serif;
  font-size: 16px; font-weight: 700; cursor: pointer;
  transition: all 0.2s;
}
.np-btn.active { background: #7c83ff; border-color: #7c83ff; }
.player-rows { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.player-row { display: flex; align-items: center; gap: 8px; }
.pawn-badge {
  font-size: 22px; width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.06); border-radius: 8px; flex-shrink: 0;
}

/* ── Action buttons ── */
.actions { display: flex; flex-direction: column; gap: 10px; }
.btn-play {
  width: 100%; padding: 16px; border-radius: 14px; border: none;
  background: linear-gradient(135deg, var(--gold2), var(--gold));
  color: #1a1200; font-family: 'Rubik', sans-serif;
  font-size: 17px; font-weight: 900; cursor: pointer;
  transition: all 0.2s; letter-spacing: 0.5px;
  box-shadow: 0 4px 24px rgba(240,192,64,0.3);
}
.btn-play:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(240,192,64,0.4); }
.btn-admin {
  width: 100%; padding: 12px; border-radius: 12px;
  border: 1.5px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.5); font-family: 'Rubik', sans-serif;
  font-size: 13px; cursor: pointer; transition: all 0.2s;
}
.btn-admin:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); }

/* ── Floating admin tab ── */
.admin-tab {
  position: fixed; right: 0; top: 50%; transform: translateY(-50%);
  z-index: 100;
  background: linear-gradient(160deg, #1a1d2e, #0e1020);
  border: 1px solid rgba(240,192,64,0.25);
  border-right: none;
  border-radius: 14px 0 0 14px;
  padding: 14px 10px;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  box-shadow: -4px 0 20px rgba(0,0,0,0.4);
  transition: all 0.2s;
  writing-mode: vertical-rl;
  text-orientation: mixed;
}
.admin-tab:hover {
  background: linear-gradient(160deg, #252840, #151828);
  border-color: rgba(240,192,64,0.5);
  box-shadow: -6px 0 28px rgba(0,0,0,0.5);
  padding-right: 14px;
}
.admin-tab-icon { font-size: 18px; writing-mode: horizontal-tb; }
.admin-tab-label {
  font-size: 11px; font-weight: 700; color: rgba(240,192,64,0.7);
  letter-spacing: 1.5px;
}

/* ── Continue session ── */
.continue-banner {
  margin-bottom: 18px; padding: 12px 16px; border-radius: 12px;
  background: rgba(124,131,255,0.1); border: 1px solid rgba(124,131,255,0.3);
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; cursor: pointer; transition: all 0.2s;
}
.continue-banner:hover { background: rgba(124,131,255,0.15); }
.continue-text { font-size: 12px; color: #aab; }
.continue-name { font-size: 14px; font-weight: 700; color: var(--text); }
.continue-btn {
  padding: 6px 14px; border-radius: 8px; border: none;
  background: #7c83ff; color: #fff;
  font-family: 'Rubik', sans-serif; font-size: 12px;
  font-weight: 700; cursor: pointer; white-space: nowrap;
}

/* ── Leaderboard peek ── */
.lb-peek {
  margin-top: 24px; position: relative; z-index: 1;
  width: 100%; max-width: 440px;
  animation: slideUp 0.8s 0.4s both ease;
}
.lb-peek-title {
  font-size: 11px; color: rgba(240,192,64,0.5);
  letter-spacing: 1px; margin-bottom: 8px; text-align: center;
}
.lb-peek-list { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
.lb-pill {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px; padding: 4px 12px;
  font-size: 12px;
}
.lb-pill-rank { color: var(--gold); font-weight: 700; }
.lb-pill-name { color: var(--text); }
.lb-pill-score { color: var(--gold); font-size: 11px; }

/* Admin modal */
.admin-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.92);
  z-index: 900; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.admin-box {
  background: linear-gradient(160deg, #1a1d2e, #0e1020);
  border: 1px solid rgba(240,192,64,0.2); border-radius: 20px;
  padding: 24px; width: 100%; max-width: 380px; text-align: center;
}
.admin-title { font-size: 20px; font-weight: 800; color: var(--gold); margin-bottom: 6px; }
.admin-sub { font-size: 12px; color: #888; margin-bottom: 20px; }
.admin-input {
  width: 100%; padding: 12px 16px; border-radius: 12px;
  border: 1.5px solid #2e3250; background: #252840;
  color: var(--text); font-family: 'Rubik', sans-serif;
  font-size: 15px; outline: none; text-align: center;
  margin-bottom: 14px; transition: border-color 0.2s;
}
.admin-input:focus { border-color: var(--gold2); }
.admin-btns { display: flex; gap: 8px; }
.btn-confirm {
  flex: 1; padding: 12px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, var(--gold2), var(--gold));
  color: #1a1200; font-family: 'Rubik', sans-serif;
  font-size: 14px; font-weight: 800; cursor: pointer;
}
.btn-cancel {
  flex: 1; padding: 12px; border-radius: 10px;
  border: 1.5px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: var(--text); font-family: 'Rubik', sans-serif;
  font-size: 14px; cursor: pointer;
}
.error-msg { font-size: 12px; color: #ef4444; margin-top: 6px; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<!-- Floating admin tab -->
<div class="admin-tab" id="adminTab" title="כניסה לאזור ניהול">
  <span class="admin-tab-icon">🔐</span>
  <span class="admin-tab-label">ניהול</span>
</div>

<!-- MAIN CONTENT -->
<div class="logo-wrap">
  <span class="logo-icon">🎲</span>
  <div class="logo-title">בגרות מונופול</div>
  <div class="logo-sub">תקשורת וחברה תשפ"ו · 33 מושגים</div>
</div>

<div class="main-card">

  <!-- Continue saved session -->
  <div class="continue-banner hidden" id="continueBanner">
    <div>
      <div class="continue-text">המשך משחק קיים</div>
      <div class="continue-name" id="continueName">—</div>
    </div>
    <button class="continue-btn">המשך ▶</button>
  </div>

  <!-- Mode selection -->
  <div class="section-title">מצב משחק</div>
  <div class="mode-grid">
    <div class="mode-btn selected" id="modeSolo">
      <span class="mode-icon">🧑</span>
      <div class="mode-label">משחק יחיד</div>
      <div class="mode-desc">תרגול עצמאי</div>
    </div>
    <div class="mode-btn" id="modeGroup">
      <span class="mode-icon">👥</span>
      <div class="mode-label">משחק קבוצתי</div>
      <div class="mode-desc">2–4 שחקנים</div>
    </div>
  </div>

  <!-- Solo: single name -->
  <div class="name-section" id="soloSection">
    <div class="section-title">שמך / שם הקבוצה</div>
    <input class="name-input" id="soloName" placeholder="למשל: קבוצה א' / ירין" />
  </div>

  <!-- Group: player count + names -->
  <div class="np-section hidden" id="groupSection">
    <div class="section-title">כמה שחקנים?</div>
    <div class="np-grid">
      <button class="np-btn active" data-n="2">2</button>
      <button class="np-btn" data-n="3">3</button>
      <button class="np-btn" data-n="4">4</button>
    </div>
    <div class="player-rows" id="playerRows"></div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn-play" id="btnPlay">🎮 התחל משחק</button>
  </div>

</div>

<!-- Leaderboard preview -->
<div class="lb-peek">
  <div class="lb-peek-title">🏆 מצטיינים</div>
  <div class="lb-peek-list" id="lbPeek">
    <div class="lb-pill" style="opacity:0.4">טוען...</div>
  </div>
</div>

<!-- Admin password modal -->
<div class="admin-modal hidden" id="adminModal">
  <div class="admin-box">
    <div class="admin-title">🔐 אזור ניהול</div>
    <div class="admin-sub">הכנס סיסמת מנהל לגישה לממשק הניהול</div>
    <input class="admin-input" type="password" id="adminPwd" placeholder="סיסמה" />
    <div class="error-msg hidden" id="adminErr">סיסמה שגויה</div>
    <div class="admin-btns">
      <button class="btn-confirm" id="btnConfirm">כניסה</button>
      <button class="btn-cancel" id="btnCancel">ביטול</button>
    </div>
  </div>
</div>

<script type="module">
import { getLeaderboard, loadGameState, db, ref, onValue } from './js/firebase-config.js';

const ADMIN_PASSWORD = 'ibt1234';
const PAWNS = ['🔴','🔵','🟢','🟡'];

let currentMode = 'solo';
let numPlayers = 2;

// ── Stars ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%; top:${Math.random()*100}%;
    --t:${(Math.random()*3+2).toFixed(1)}s;
    animation-delay:${(Math.random()*4).toFixed(1)}s
  `;
  starsEl.appendChild(s);
}

// ── Mode ──
function selectMode(mode) {
  currentMode = mode;
  document.getElementById('modeSolo').classList.toggle('selected', mode === 'solo');
  document.getElementById('modeGroup').classList.toggle('selected', mode === 'group');
  document.getElementById('soloSection').classList.toggle('hidden', mode !== 'solo');
  document.getElementById('groupSection').classList.toggle('hidden', mode !== 'group');
}

// ── Group players ──
function setNumPlayers(n) {
  numPlayers = n;
  document.querySelectorAll('.np-btn').forEach(b =>
    b.classList.toggle('active', parseInt(b.dataset.n) === n));
  renderPlayerRows();
}

function renderPlayerRows() {
  const rows = document.getElementById('playerRows');
  const defaults = ['שחקן 1','שחקן 2','שחקן 3','שחקן 4'];
  rows.innerHTML = '';
  for (let i = 0; i < numPlayers; i++) {
    rows.innerHTML += `
      <div class="player-row">
        <div class="pawn-badge">${PAWNS[i]}</div>
        <input class="name-input" id="pname${i}" value="${defaults[i]}" placeholder="שם שחקן ${i+1}" style="flex:1"/>
      </div>`;
  }
}
renderPlayerRows();

// ── Start game ──
function startGame() {
  let players = [];
  if (currentMode === 'solo') {
    const name = document.getElementById('soloName').value.trim() || 'שחקן';
    players = [{ name, idx: 0 }];
  } else {
    for (let i = 0; i < numPlayers; i++) {
      const name = document.getElementById('pname' + i)?.value.trim() || `שחקן ${i+1}`;
      players.push({ name, idx: i });
    }
  }
  const sessionId = 'session_' + Date.now();
  const data = { players, mode: currentMode, sessionId, isNew: true };
  sessionStorage.setItem('gameInit', JSON.stringify(data));
  window.location.href = 'game.html';
}

// ── Resume session ──
const saved = localStorage.getItem('lastSession');
if (saved) {
  try {
    const s = JSON.parse(saved);
    document.getElementById('continueName').textContent = s.playerNames?.join(', ') || s.sessionId;
    document.getElementById('continueBanner').classList.remove('hidden');
  } catch(e) {}
}

function resumeSession() {
  const saved = localStorage.getItem('lastSession');
  if (!saved) return;
  const s = JSON.parse(saved);
  sessionStorage.setItem('gameInit', JSON.stringify({ ...s, isNew: false }));
  window.location.href = 'game.html';
}

// ── Admin modal ──
function openAdminModal() {
  document.getElementById('adminModal').classList.remove('hidden');
  document.getElementById('adminPwd').value = '';
  document.getElementById('adminErr').classList.add('hidden');
  setTimeout(() => document.getElementById('adminPwd').focus(), 100);
}

function closeAdminModal() {
  document.getElementById('adminModal').classList.add('hidden');
}

function checkAdmin() {
  const pwd = document.getElementById('adminPwd').value;
  if (pwd === ADMIN_PASSWORD) {
    window.location.href = 'admin.html';
  } else {
    document.getElementById('adminErr').classList.remove('hidden');
    document.getElementById('adminPwd').value = '';
  }
}

// ── Wire up all event listeners ──
document.getElementById('adminTab').addEventListener('click', openAdminModal);
document.getElementById('modeSolo').addEventListener('click', () => selectMode('solo'));
document.getElementById('modeGroup').addEventListener('click', () => selectMode('group'));
document.getElementById('continueBanner').addEventListener('click', resumeSession);
document.getElementById('btnPlay').addEventListener('click', startGame);
document.getElementById('btnConfirm').addEventListener('click', checkAdmin);
document.getElementById('btnCancel').addEventListener('click', closeAdminModal);
document.getElementById('adminPwd').addEventListener('keydown', e => { if (e.key === 'Enter') checkAdmin(); });
document.querySelectorAll('.np-btn').forEach(b =>
  b.addEventListener('click', () => setNumPlayers(parseInt(b.dataset.n))));

// ── Leaderboard preview ──
async function loadLb() {
  try {
    const lb = await getLeaderboard();
    const el = document.getElementById('lbPeek');
    if (!lb.length) { el.innerHTML = '<div class="lb-pill" style="opacity:0.4">אין נתונים עדיין</div>'; return; }
    const medals = ['🥇','🥈','🥉'];
    el.innerHTML = lb.slice(0,5).map((p, i) => `
      <div class="lb-pill">
        <span class="lb-pill-rank">${medals[i] || (i+1)}</span>
        <span class="lb-pill-name">${p.name}</span>
        <span class="lb-pill-score">⭐${p.score}</span>
      </div>`).join('');
  } catch(e) {
    document.getElementById('lbPeek').innerHTML = '<div class="lb-pill" style="opacity:0.3">טעינה...</div>';
  }
}
loadLb();
</script>
</body>
</html>
