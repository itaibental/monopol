<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בגרות מונופול — תקשורת וחברה תשפ"ו</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- SETUP SCREEN -->
<div class="setup-overlay" id="setupOverlay">
  <div class="setup-box">
    <div class="setup-title">🎲 בגרות מונופול</div>
    <div class="setup-sub">תקשורת וחברה תשפ"ו — למד תוך כדי משחק</div>
    <div style="font-size:13px;color:#888;margin-bottom:12px">כמה שחקנים?</div>
    <div class="num-players-btns">
      <button class="np-btn active" data-n="1">1</button>
      <button class="np-btn" data-n="2">2</button>
      <button class="np-btn" data-n="3">3</button>
      <button class="np-btn" data-n="4">4</button>
    </div>
    <div class="player-inputs" id="playerInputs"></div>
    <button class="start-btn" onclick="startGame()">התחל משחק ▶</button>
  </div>
</div>

<!-- HEADER -->
<header class="game-header">
  <div class="header-right">
    <div class="game-title">🎲 בגרות מונופול</div>
    <div class="game-sub">תקשורת וחברה תשפ"ו · 33 מושגים</div>
  </div>
  <div class="header-controls">
    <button class="hbtn" onclick="showSetup()">חדש</button>
    <button class="hbtn" id="visitedCount">0/33 ✓</button>
  </div>
</header>

<!-- PLAYER PANEL -->
<div class="player-panel" id="playerPanel"></div>

<!-- SCENE -->
<div class="scene-wrap" id="sceneWrap">
  <div class="board-3d" id="board3d">
    <div class="board" id="board">
      <!-- cells rendered by JS -->
      <div class="board-center">
        <div class="center-title">תקשורת<br>וחברה</div>
        <div class="center-sub">תשפ"ו 2026</div>
        <div class="dice-area">
          <div class="die" id="die1">🎲</div>
          <div class="die" id="die2">🎲</div>
        </div>
        <button class="roll-btn" id="rollBtn" onclick="rollDice()">הטל קוביות</button>
      </div>
      <div class="pawns-layer" id="pawnsLayer"></div>
    </div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls-panel">
  <div class="turn-info">
    <div class="turn-label">תור</div>
    <div class="turn-value" id="turnInfo">לחץ "התחל משחק"</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this&&!quizActive)closeModal()">
  <div class="modal-box" id="modalBox" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- JavaScript -->
<script src="data.js"></script>
<script src="board.js"></script>
<script src="game.js"></script>
</body>
</html>
